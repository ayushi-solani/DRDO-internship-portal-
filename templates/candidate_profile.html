{% extends "base.html" %}
{% block title_suffix %} | My Profile{% endblock %}
{% block content %}
<div class="page-header fade-in">
  <h4><i class="bi bi-person-vcard me-2"></i>My Profile</h4>
  <p>Keep your academic details updated — HR reviews this alongside your application.</p>
</div>

<div class="card fade-in">
  <div class="card-header"><i class="bi bi-pencil-square me-2 text-muted"></i>Academic & Personal Details</div>
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="dob" class="form-control" value="{{ profile.dob or '' }}"/>
        </div>
        <div class="col-md-4">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select">
            <option value="">Select</option>
            {% for g in ['Male','Female','Other'] %}
            <option {{ 'selected' if profile.gender == g }}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" value="{{ session.user_name }}" disabled/>
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea name="address" rows="2" class="form-control" placeholder="Your current address…">{{ profile.address or '' }}</textarea>
        </div>

        <div class="col-12"><hr class="my-1"/><p class="fw-semibold mb-0" style="font-size:.82rem;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;">Academic Information</p></div>

        <div class="col-md-6">
          <label class="form-label">College / University</label>
          <input type="text" name="college" class="form-control" value="{{ profile.college or '' }}" placeholder="e.g. IIT Delhi"/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Degree</label>
          <input type="text" name="degree" class="form-control" value="{{ profile.degree or '' }}" placeholder="e.g. B.Tech"/>
        </div>
        <div class="col-md-4">
          <label class="form-label">Branch / Specialization</label>
          <input type="text" name="branch" class="form-control" value="{{ profile.branch or '' }}" placeholder="e.g. Computer Science"/>
        </div>
        <div class="col-md-4">
          <label class="form-label">Graduation Year</label>
          <input type="number" name="graduation_year" class="form-control" value="{{ profile.graduation_year or '' }}" min="2020" max="2030"/>
        </div>
        <div class="col-md-4">
          <label class="form-label">CGPA <span class="text-muted fw-normal">(out of 10)</span></label>
          <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10" value="{{ profile.cgpa or '' }}" placeholder="e.g. 8.5"/>
        </div>
        <div class="col-12">
          <label class="form-label">Skills</label>
          <textarea name="skills" rows="3" class="form-control" placeholder="Python, Machine Learning, C++, MATLAB, CAD, etc.">{{ profile.skills or '' }}</textarea>
        </div>
      </div>

      <div class="mt-4 d-flex justify-content-end gap-2">
        <a href="{{ url_for('candidate_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        <button class="btn btn-navy px-4"><i class="bi bi-save me-2"></i>Save Profile</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

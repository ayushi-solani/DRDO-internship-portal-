{% extends "base.html" %}
{% block title_suffix %} | Register{% endblock %}
{% block content %}

<div class="row justify-content-center mt-3">
  <div class="col-md-6 col-lg-5">

    <div class="text-center mb-4 fade-in">
      <img src="{{ url_for('static', filename='images/drdo_logo.png') }}"
           height="64" alt="DRDO" class="mb-3" style="object-fit:contain;"/>
      <h4 class="fw-bold mb-0" style="color:#003366;">Candidate Registration</h4>
      <p class="text-muted" style="font-size:.82rem;">DRDO Internship Portal &mdash; New Account</p>
    </div>

    <div class="card shadow-sm fade-in" style="border-top:4px solid var(--orange);">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="full_name" class="form-control" placeholder="Your full name" required/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-phone"></i></span>
              <input type="tel" name="phone" class="form-control" placeholder="10-digit mobile number"/>
            </div>
          </div>
          <div class="row g-3 mb-1">
            <div class="col">
              <label class="form-label">Password</label>
              <input type="password" name="password" id="pwd" class="form-control" required minlength="6" placeholder="Min 6 characters"/>
            </div>
            <div class="col">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm_password" id="cpwd" class="form-control" required placeholder="Re-enter password"/>
            </div>
          </div>
          <div id="pwdAlert" class="alert alert-danger py-1 d-none small mb-3">Passwords do not match.</div>
          <button class="btn btn-navy w-100 py-2 fw-semibold mt-2" id="submitBtn" style="letter-spacing:.5px;">
            <i class="bi bi-person-plus me-2"></i>Create Account
          </button>
        </form>
        <p class="text-center mt-3 mb-0" style="font-size:.82rem;">
          Already registered? <a href="{{ url_for('login') }}" class="fw-semibold" style="color:#FF6600;">Sign in</a>
        </p>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const p = document.getElementById('pwd'), c = document.getElementById('cpwd');
const al = document.getElementById('pwdAlert'), btn = document.getElementById('submitBtn');
function check() {
  const mismatch = c.value && p.value !== c.value;
  al.classList.toggle('d-none', !mismatch);
  btn.disabled = mismatch;
}
p.addEventListener('input', check); c.addEventListener('input', check);
</script>
{% endblock %}
